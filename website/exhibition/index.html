<style>
:root{--bg:#121218;--term-bg:#17171f;--border:#2a2a3a;--src:#eeeef4;--dim:#9898b0;--out:#d0d0de;--accent:#d8d8e4;--hint:#9090a8;--ear:#1c1c26;--link:#a0a0be;--title-bar:#1a1a24;--warm:#d4a87c}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:#080910;height:100%}
pre,code{font-variant-ligatures:none}
::selection{background:#2a2a4a}
::-webkit-scrollbar{width:3px;height:2px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideR{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideL{from{transform:translateX(-40px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes breathe{0%,100%{background-position:50% 40%}50%{background-position:50% 60%}}
body{font-family:'JetBrains Mono','M PLUS 1 Code',monospace;font-weight:400;background:transparent;color:var(--src);height:100vh;height:100dvh;overflow:hidden;animation:fadeIn .7s ease backwards;display:flex;flex-direction:column;align-items:center;padding:44px 22px 28px}
.ears{width:100%;max-width:640px;display:flex;justify-content:center;flex-shrink:0}
.ears-inner{display:flex;justify-content:space-between;width:calc(100% - 48px);position:relative;top:1px;z-index:1}
.ear{width:0;height:0;border-left:11px solid transparent;border-right:11px solid transparent;border-bottom:12px solid rgba(216,216,228,.06);border-radius:2px 2px 0 0}
.terminal{width:100%;max-width:640px;flex:1;min-height:0;background:transparent;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);border:1px solid rgba(216,216,228,.07);border-radius:8px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 4px 40px rgba(0,0,0,.25)}
.tab-bar{background:transparent;border-bottom:1px solid rgba(216,216,228,.08);padding:12px 16px;display:flex;align-items:center;gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;-ms-overflow-style:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;padding:0 18px 4px;letter-spacing:.18em;white-space:nowrap;flex-shrink:0;cursor:pointer;transition:color .2s;-webkit-tap-highlight-color:transparent}
.tab-divider{width:1px;align-self:stretch;background:var(--border);margin:6px 2px;flex-shrink:0}
.tab{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:500;font-variant-numeric:lining-nums;padding:0 16px 4px;cursor:pointer;transition:color .15s;letter-spacing:.02em;white-space:nowrap;flex-shrink:0;-webkit-tap-highlight-color:transparent;border-bottom:2px solid transparent}
.tab-after{font-family:'Cormorant Garamond','Shippori Mincho',serif;font-size:13.5px;letter-spacing:.06em}
.tab.active{color:var(--src)}.tab:not(.active){color:var(--hint)}
.src-wrap{position:relative;flex-shrink:1;min-height:0;max-height:46vh;display:flex;flex-direction:column}
.src-wrap.expanded{max-height:none;flex:1}
.src-area{padding:30px 32px 16px;font-size:14px;line-height:1.5;overflow-y:auto;overflow-x:auto;flex:1;min-height:0;font-weight:400;background:#080910}
.src-area pre{font-family:'JetBrains Mono','M PLUS 1 Code',monospace;font-size:inherit;line-height:inherit;margin:0;padding:0;white-space:pre;color:var(--src)}
.expand-btn{position:absolute;bottom:4px;right:6px;color:var(--dim);font-size:16px;cursor:pointer;padding:4px 6px;transition:color .15s;-webkit-tap-highlight-color:transparent}
.sep{border-top:1px solid var(--border);margin:16px 32px 2px;flex-shrink:0}
.inter-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:8px 32px 24px;font-size:13.5px;line-height:1.55;min-height:80px;font-weight:500}
.cat-title{margin-top:8px;margin-bottom:12px}
.cat-title-name{font-size:15px;font-weight:400;color:var(--src);letter-spacing:.04em}
.cat-title-ja{font-size:13px;color:var(--hint)}
.overview{padding:20px 0 8px;color:var(--out);line-height:1.75;font-family:'Shippori Mincho',serif}
.overview p{font-size:15.5px;margin-bottom:14px;color:var(--out)}
.overview pre{font-family:'JetBrains Mono','M PLUS 1 Code',monospace;margin:12px 0;padding:12px 16px;background:transparent;border:1px solid rgba(216,216,228,.14);border-radius:3px;font-size:12px;white-space:pre;overflow-x:auto;color:var(--src);line-height:1.5}
.selector{margin-top:12px}
.option{padding:6px 0;cursor:pointer;display:flex;gap:8px;transition:color .1s;-webkit-tap-highlight-color:transparent}
.option .marker{width:14px;flex-shrink:0;color:transparent}
.option.sel .marker{color:var(--accent)}
.option.sel{color:var(--src)}.option:not(.sel){color:var(--dim)}
.option .label{font-weight:400}.option.sel .label{font-weight:500}
.option .desc{color:var(--dim);font-size:.9em;margin-top:1px;padding-left:24px}
.out-line{min-height:1.5em;color:var(--out);text-wrap:pretty}
.out-line.warm{color:var(--warm)}
.out-line.dim{color:var(--dim)}
.op-gate{margin-top:10px;padding:6px 2px;cursor:pointer;-webkit-tap-highlight-color:transparent;color:var(--dim)}
.op-gate:hover .op-caret{color:var(--src)}
.op-gate:focus-visible{outline:none}
.op-caret{display:inline-block;font-size:15px;color:var(--dim);animation:blink 1.15s steps(1) infinite}
@keyframes blink{0%,55%{opacity:1}56%,100%{opacity:.18}}
.wait-msg{font-family:'Shippori Mincho',serif;display:flex;align-items:center;justify-content:center;min-height:200px;padding:40px 20px;text-align:center;color:var(--dim);font-size:15px;letter-spacing:.04em}
.continue-btn{margin-top:14px;color:var(--out);font-size:13px;cursor:pointer;-webkit-tap-highlight-color:transparent;padding:6px 0;display:flex;align-items:center;gap:6px}
a.out-link{color:var(--link);text-decoration:none;border-bottom:1px solid var(--border)}
.afterword-sig{margin-top:18px;text-align:right;color:var(--hint);font-size:.95em;letter-spacing:.06em}
.fb{margin-top:18px}
.fb-q{color:var(--out);font-size:13.5px;line-height:1.6;font-family:'Shippori Mincho',serif}
.fb-opt{color:var(--hint);font-size:.85em}
.fb-text{width:100%;margin-top:10px;background:rgba(8,9,16,.32);border:1px solid var(--border);border-radius:4px;color:var(--src);font-family:'Shippori Mincho',serif;font-size:14px;line-height:1.6;padding:10px 12px;resize:vertical;-webkit-tap-highlight-color:transparent}
.fb-text:focus-visible{outline:none;border-color:var(--hint)}
.fb-send{margin-top:10px;display:inline-block;color:var(--out);border:1px solid var(--border);border-radius:4px;padding:6px 16px;font-size:13px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:color .15s,border-color .15s}
.fb-send:hover{color:var(--src);border-color:var(--hint)}
.view-overlay{position:fixed;inset:0;z-index:200;background:#080910;animation:fadeIn .4s ease;display:none;flex-direction:column;align-items:center}
.view-overlay.show{display:flex}
.view-inner{width:100%;max-width:680px;flex:1;display:flex;flex-direction:column;overflow:hidden;padding:0 40px}
.view-header{padding:40px 0 32px;display:flex;align-items:baseline;flex-shrink:0}
.view-logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;letter-spacing:.18em;color:var(--dim)}
.view-close{margin-left:auto;color:var(--hint);font-size:18px;cursor:pointer;padding:4px 8px;-webkit-tap-highlight-color:transparent;transition:color .15s}
.view-pre{font-family:'JetBrains Mono','M PLUS 1 Code',monospace;font-size:14px;line-height:1.5;font-weight:400;margin:0;padding:0 8px 80px;white-space:pre;overflow-y:auto;overflow-x:auto;color:var(--src);flex:1}
.lang-toggle{position:fixed;bottom:16px;right:16px;z-index:50;font-size:11px;color:var(--hint);cursor:pointer;padding:6px 10px;border:1px solid var(--border);border-radius:4px;background:rgba(8,9,16,.28);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);-webkit-tap-highlight-color:transparent;transition:color .15s}
.anim-sr{animation:slideR .3s ease}.anim-sl{animation:slideL .3s ease}.anim-fi{animation:fadeIn .3s ease}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0}
:focus{outline:none}
:focus-visible{outline:1.5px solid var(--warm);outline-offset:2px;border-radius:2px}
/* tab bar & selector already show state via color/underline — no boxy ring there */
.tab:focus-visible,.tab-logo:focus-visible{outline:none;color:var(--src)}
.selector:focus-visible{outline:none}
.continue-btn:focus-visible{outline:none}
body.leaving{opacity:0;transition:opacity .6s ease} /* exit fade when leaving for bugcat.org */
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.001ms!important;animation-delay:0ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}
  html{scroll-behavior:auto}
}
/* first paint: frame + tabs appear first; only the tab content (overview) emerges a beat later (initial load only) */
body.intro .overview{animation:fadeIn .8s ease .6s backwards}
.terminal,.view-overlay{text-shadow:0 1px 12px rgba(0,0,0,.72),0 0 3px rgba(0,0,0,.6)}
/* phones: trade side padding for reading width, tighten the top, shrink type a touch,
   and compress the tab bar so the Afterword tab fits on one row (no hidden scroll) */
@media (max-width:600px){
  body{padding:24px 12px 20px}
  .tab-bar{padding:11px 10px}
  .tab-logo{font-size:15px;padding:0 10px 4px;letter-spacing:.1em}
  .tab{font-size:14px;padding:0 9px 4px}
  .tab-after{font-size:12px}
  .src-wrap{max-height:40vh}
  .src-area{padding:22px 16px 12px;font-size:12px}
  .view-pre{font-size:13px}
  .sep{margin:14px 16px 2px}
  .inter-area{padding:6px 16px 18px;font-size:13px}
  .overview p{font-size:15px}
  .cat-title-name{font-size:14px}
  .view-inner{padding:0 20px}
  .view-header{padding:28px 0 24px}
}
</style>

src:`contract OverflowCat is BugCat {
    mapping(address => uint) public balance;

    function batchTransfer(
        address[] memory _receivers,
        uint256 _value
    ) public {
        uint count = _receivers.length;
        uint amount = count * _value;
        require(
            _value > 0 &&
            balance[msg.sender] >= amount
        );
        balance[msg.sender] -= amount;
        for (uint i = 0; i < count; i++) {
            balance[_receivers[i]] += _value;
        }
    }

    function caress() public {
        if (balance[msg.sender] > 0) {
            emit Meow(msg.sender, "overflow");
        }
    }

    function remember() external view returns (bool) {
        address BecToken =
            0xC5d105E63711398aF9bbff092d4B6769C82F793D;
        uint256 size;
        assembly { size := extcodesize(BecToken) }
        return size > 0;

}`,rq:"extcodesize(BecToken) > 0",cd:'batchTransfer(overflow) \u2192 caress()',ma:"overflow",

/* LANGUAGE — URL param > saved preference > browser language; choice persists across pages */
function langDetect(){
  const u=new URLSearchParams(location.search).get("lang");
  if(u==="ja"||u==="en")return u;
  try{const s=localStorage.getItem("bugcat-lang");if(s==="ja"||s==="en")return s}catch(e){}
  const n=(navigator.languages&&navigator.languages[0])||navigator.language||"";
  return /^ja/i.test(n)?"ja":"en";
}
function langSave(l){try{localStorage.setItem("bugcat-lang",l)}catch(e){}}

/* ANONYMOUS LOG — ephemeral in-memory session id (not stored on device), cookieless beacon */
const SID=Math.random().toString(36).slice(2,10);
function track(type,extra){try{const d=JSON.stringify({type,session:SID,lang:S.lang,path:location.pathname,...extra});navigator.sendBeacon("/api/event",new Blob([d],{type:"application/json"}))}catch(e){}}

/* ASYNC OPS */
const MIN_DUR={remember:3000,caress:6000};
const MIN_QUERY={remember:5000,caress:10000};
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const txShort=h=>h.slice(0,10)+"\u2026"+h.slice(-6);

/* an operation unfolds beat by beat; each beat is revealed, then waits for the reader to advance */
function intentBeat(type,c){
  const note=(type==="remember"?c.nr:c.nc)[S.lang][0];
  const body=type==="remember"?c.rq:c.cd;
  const lines=[{x:type==="remember"?"$ remember()":"$ caress()",k:""},{x:"",k:""},{x:"  "+note,k:"dim"}];
  body.split("\n").forEach(b=>lines.push({x:"  "+b,k:""}));
  return lines;
}
function resultBeat(type,c,d){
  const note=(type==="remember"?c.nr:c.nc)[S.lang][1];
  if(type==="remember"){
    const ex=!!d.exists;
    const lines=[{x:"",k:""},{x:"  \u2192 "+(ex?"true":"false"),k:""}];
    if(ex)lines.push({x:"  "+note,k:"dim"});
    if(d.block)lines.push({x:"  block "+d.block,k:""});
    return {lines,link:null,meow:false};
  }
  const lines=[{x:"",k:""}];
  const explorer=d.chain==="sepolia"?"https://sepolia.etherscan.io":"https://etherscan.io";
  // Tx errored. If we still have a hash (poll timed out — the tx may still mine later) keep the
  // Etherscan link so the reader can check the outcome themselves.
  if(d.error){
    lines.push({x:"  "+tx().txf,k:"dim"});
    const link=d.txHash?{label:"tx "+txShort(d.txHash),href:explorer+"/tx/"+d.txHash}:null;
    return {lines,link,meow:false};
  }
  if(d.txHash||d.conf)lines.push({x:"  "+tx().txc,k:""});
  let meow=false;
  // When the receipt names the sender (live tx), surface the real From: address so the event line
  // visually echoes the tx page on Etherscan. dry-run / no-receipt paths keep "msg.sender".
  if(d.meow){meow=true;const sndr=d.from?txShort(d.from):"msg.sender";lines.push({x:"  "+note,k:"dim"},{x:'  event Meow('+sndr+', "'+c.ma+'")',k:"warm"});}
  else{const fail=(c.nc[S.lang][2])||tx().silent;lines.push({x:"  "+fail,k:"dim"});}
  if(d.block)lines.push({x:"  block "+d.block,k:""});
  if(d.dryRun)lines.push({x:"  "+tx().dry,k:"dim"});
  const link=d.txHash?{label:"tx "+txShort(d.txHash),href:explorer+"/tx/"+d.txHash}:null;
  return {lines,link,meow};
}
function helpBeat(c){
  const ls=S.lang==="ja"?c.hJa:c.hEn;
  const lines=[{x:"$ help",k:""},{x:"",k:""}];
  ls.forEach(l=>lines.push({x:"  "+l,k:""}));
  return lines;
}

function startOp(ci,type){
  const c=CATS[ci],cs=gs(ci);
  const op={type,bi:0,shown:0,gate:false,querying:false,ready:false,beats:[],link:null,qSt:0};
  if(type==="help"){
    op.beats[0]=helpBeat(c);
    op.link={label:"bugcat.org",href:"https://bugcat.org"};
    op.ready=true;
    track("help",{cat:ci});
  }else{
    op.beats[0]=intentBeat(type,c);
    track(type,{cat:ci});
    // The API call (and, in live mode, the real transaction) is deferred to runOp(),
    // fired only when the reader presses 続ける — never at selection time.
  }
  cs.m="op";cs.op=op;
  revealStart(ci);
}

function runOp(ci,op){
  if(op.started)return; op.started=true;
  const c=CATS[ci],cs=gs(ci),type=op.type;
  (async()=>{
    const start=Date.now();let d=null;
    try{
      const r=await fetch("/api/"+type,{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({cat:ci,session:SID,lang:S.lang})});
      d=await r.json();
      if(!r.ok||!d||d.ok===false) throw new Error("api");
    }catch(e){
      // Do NOT fake a successful Meow on failure. remember (a read) degrades to true; caress is
      // reported honestly as a failed transaction so an unlucky / errored attempt isn't masked.
      d=type==="remember"?{exists:true}:{error:true};
    }
    // caress() returns as soon as the tx is in the mempool. Expose the Etherscan link now (so the
    // reader sees something concrete to click during the 15–25s mining wait) and poll the receipt.
    if(type==="caress"&&d&&d.pending&&d.txHash){
      const explorer=d.chain==="sepolia"?"https://sepolia.etherscan.io":"https://etherscan.io";
      op.link={label:"tx "+txShort(d.txHash),href:explorer+"/tx/"+d.txHash};
      renderInter();
      d=await pollTxStatus(d.txHash,d.chain,cs,op);
      if(cs.op!==op) return; // abandoned mid-poll
    }
    const res=resultBeat(type,c,d||{});
    const elapsed=Date.now()-start;
    if(elapsed<MIN_DUR[type]) await sleep(MIN_DUR[type]-elapsed);
    if(cs.op!==op) return; // abandoned (tab moved on / reset)
    op._d=d;op.beats[1]=res.lines;op.link=res.link;op.ready=true;
    if(type==="caress"&&res.meow) dispatchEvent(new CustomEvent("bugcat:caress",{detail:{cat:ci}}));
    if(op.querying)finishQuery(ci,op);
  })();
}

// Poll /api/tx-status for confirmation. Sepolia blocks are ~12s; mainnet ~12s. We back off from
// 3s up to 8s and give up after ~90s (visitors waiting on a stuck tx can still see the link).
async function pollTxStatus(hash,chain,cs,op){
  let delay=3000; const deadline=Date.now()+90000;
  while(Date.now()<deadline){
    if(cs.op!==op) return null;
    await sleep(delay);
    if(cs.op!==op) return null;
    try{
      const r=await fetch("/api/tx-status?hash="+encodeURIComponent(hash));
      const d=await r.json();
      if(d&&d.ok&&d.confirmed) return {...d,txHash:hash,chain};
    }catch(e){}
    delay=Math.min(Math.floor(delay*1.3),8000);
  }
  // Timed out — preserve the hash so the reader can still follow the link to Etherscan.
  return {error:true,txHash:hash,chain};
}

function revealStart(ci){
  const cs=gs(ci),op=cs.op;if(!op)return;
  clearInterval(S._ti);
  const b=op.beats[op.bi]||[];
  if(REDUCED){op.shown=b.length;op.gate=true;announce(b.map(l=>l.x).join(". "));if(S.idx===ci)renderInter();return;}
  op.gate=false;
  S._ti=setInterval(()=>{
    const s=gs(ci);if(!s.op||s.m!=="op"){clearInterval(S._ti);S._ti=null;return}
    const bb=s.op.beats[s.op.bi]||[];
    if(s.op.shown<bb.length)s.op.shown++;
    if(s.op.shown>=bb.length){clearInterval(S._ti);S._ti=null;s.op.gate=true;announce(bb.map(l=>l.x).join(". "));}
    if(S.idx===ci)renderInter();
  },150);
}

function opAdvance(){
  const cs=gs(S.idx),op=cs.op;if(!op||!op.gate)return;
  const total=op.type==="help"?1:2;
  if(op.bi>=total-1){
    if(S._kh){removeEventListener("keydown",S._kh);S._kh=null}
    cs.h.push({type:op.type,d:op._d});
    cs.op=null;cs.m="select";renderInter();return;
  }
  op.bi++;op.shown=0;op.gate=false;
  const ci=S.idx;
  op.querying=true;op.qSt=Date.now();renderInter();
  runOp(ci,op); // fire the API call (and any live tx) now — only after 続ける
  setTimeout(()=>finishQuery(ci,op),MIN_QUERY[op.type]||0);
}

function finishQuery(ci,op){
  if(gs(ci).op!==op||!op.querying)return;
  if(!op.ready)return; // result not in yet; the fetch handler will call again
  const minQ=MIN_QUERY[op.type]||0,elapsed=Date.now()-op.qSt;
  if(elapsed<minQ){setTimeout(()=>finishQuery(ci,op),minQ-elapsed);return;}
  op.querying=false;revealStart(ci);
}

function bindOpGate(){
  const g=$("#opGate");if(g){g.onclick=opAdvance;g.focus({preventScroll:true})}
  if(S._kh)removeEventListener("keydown",S._kh);
  const kh=e=>{const cs=gs(S.idx);if(!cs||cs.m!=="op"||!cs.op||!cs.op.gate)return;if(e.key==="Enter"||e.key===" "){e.preventDefault();opAdvance()}};
  addEventListener("keydown",kh);S._kh=kh;
}

/* DOM */
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);
const tx=()=>T[S.lang];
const esc=s=>s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
function ln(t,k){return`<div class="out-line${k?" "+k:""}">${esc(t)}</div>`}
const REDUCED=matchMedia("(prefers-reduced-motion:reduce)").matches;
function announce(t){const el=$("#sr-live");if(el){el.textContent="";requestAnimationFrame(()=>{el.textContent=t})}}
function keyActivate(el){if(el)el.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();el.click()}})}

/* RENDER */
function render(){
  const i=S.idx,isCat=i>=0&&i<CATS.length,c=isCat?CATS[i]:null,w=isCat?WARM[i]:"#d4a87c";
  document.querySelector(".terminal").style.setProperty("--warm",w);
  $("#tab-home").style.color=i===-1?"var(--src)":"var(--dim)";
  $("#tab-home").setAttribute("aria-selected",i===-1);
  $$(".tab").forEach(el=>{const ti=+el.dataset.i;el.classList.toggle("active",ti===i);el.style.borderBottomColor=ti===i?(WARM[ti]||"var(--accent)"):"transparent";el.setAttribute("aria-selected",ti===i)});
  const ta=$("#tab-after");if(ta)ta.textContent=tx().after;
  document.documentElement.lang=S.lang;
  const sw=$("#srcWrap"),sp=$("#sep");
  if(isCat&&UNLOCKED){sw.style.display="";sp.style.display="";$("#srcPre").textContent=c.src;
    const sa=$(".src-area");if(sa){sa.scrollLeft=0;sa.scrollTop=0}
    $("#expandBtn").onclick=()=>{S.vm=true;viewMode()};
  }else{sw.style.display="none";sp.style.display="none"}
  if(c)$("#viewPre").textContent=c.src;
  renderInter();
  $("#langBtn").textContent=tx().lng;
}

// Re-derive an op's beats for the current language. Line counts depend only on the data (not the
// language), so the progressive-reveal indices (op.bi / op.shown) stay valid.
function syncOpLang(c,op){
  if(!op)return;
  if(op.type==="help"){op.beats[0]=helpBeat(c);return;}
  op.beats[0]=intentBeat(op.type,c);
  if(op._d)op.beats[1]=resultBeat(op.type,c,op._d).lines;
}

function renderInter(){
  const i=S.idx,el=$("#inter");
  if(i===-1){renderOv(el);return}
  if(!UNLOCKED){el.innerHTML=`<div class="wait-msg">${esc(tx().wait)}</div>`;return}
  if(i===AFTER){renderAfter(el);return}
  const c=CATS[i];
  const cs=gs(i);let h="";
  const tl=S.lang==="ja"?c.ja:c.en;
  const norm=s=>(s||"").toLowerCase().replace(/\s+/g,"");
  const sub=norm(tl)===norm(c.name)?"":` / ${tl}`;
  h+=`<div class="cat-title"><span class="cat-title-name">${c.name}</span><span class="cat-title-ja">${sub}</span></div>`;
  cs.h.forEach(e=>h+=renderHist(e,c));
  if(cs.m==="op"&&cs.op){
    const op=cs.op;
    syncOpLang(c,op); // beats were snapshotted in the language active when the op ran; re-derive for S.lang
    h+='<div style="margin-top:12px">';
    for(let bi=0;bi<op.bi;bi++)(op.beats[bi]||[]).forEach(l=>h+=ln(l.x,l.k));
    (op.beats[op.bi]||[]).slice(0,op.shown).forEach(l=>h+=ln(l.x,l.k));
    if(op.querying){const dt=Math.floor((Date.now()-op.qSt)/400),dots=".".repeat(dt%4),ql=op.type==="caress"?tx().qryC:tx().qryR;h+=ln("","")+ln("  "+ql+dots,"dim")}
    h+='</div>';
    // op.link can land before op.ready (caress broadcasts the tx, then we poll for the receipt).
    // Render it now so the reader can follow the pending tx on Etherscan while we wait.
    if(op.link)h+=`<div style="margin-top:4px"><a class="out-link" href="${esc(op.link.href)}" target="_blank" rel="noopener">${esc(op.link.label)} ↗</a></div>`;
    if(op.gate)h+=opGateHtml();
  }
  if(cs.m==="select")h+=renderSel();
  el.innerHTML=h;
  if(cs.m==="select")bindSel();
  if(cs.m==="op"&&cs.op){
    if(cs.op.gate)bindOpGate();
    else if(cs.op.querying){clearInterval(S._di);S._di=setInterval(()=>{const o=gs(S.idx)?.op;if(o&&o.querying)renderInter();else{clearInterval(S._di);S._di=null}},400)}
  }
  if(i>=0)el.scrollTo({top:el.scrollHeight,behavior:"smooth"});
}

function renderOv(el){
  const t=tx();let h='<div class="overview">';
  t.ov.forEach(p=>h+=`<p>${esc(p)}</p>`);
  h+=`<pre>${esc(IFACE)}</pre><p>${esc(t.ovEnd)}</p><div style="margin-top:20px"><a class="out-link" id="homeLink" href="/">${esc(t.proj)}</a></div></div>`;
  el.innerHTML=h;
  const hl=$("#homeLink");
  if(hl)hl.onclick=e=>{ if(REDUCED)return; e.preventDefault(); document.body.classList.add("leaving"); dispatchEvent(new CustomEvent("bugcat:home")); setTimeout(()=>{location.href=hl.getAttribute("href")},600); };
}

function renderAfter(el){
  const t=tx();
  let h='<div class="overview afterword">';
  t.aw.forEach(p=>h+=`<p>${esc(p)}</p>`);
  h+=`<p class="afterword-sig">${esc(t.sig)}</p>`;
  h+='</div><div class="sep" style="margin:16px 0 2px"></div>';
  h+=`<div class="fb"><div class="fb-q">${esc(t.fbq)} <span class="fb-opt">${esc(t.fbopt)}</span></div>`;
  h+=`<textarea id="fbText" class="fb-text" rows="3" maxlength="2000" aria-label="${esc(t.fbq)}"></textarea>`;
  h+=`<div><span class="fb-send" id="fbSend" role="button" tabindex="0">${esc(t.fbsend)}</span></div></div>`;
  el.innerHTML=h;
  bindFb();
}

function bindFb(){
  const btn=$("#fbSend"),ta=$("#fbText");
  if(!btn||!ta)return;
  const submit=()=>{
    const text=ta.value.trim();if(!text)return;
    btn.style.pointerEvents="none";
    fetch("/api/feedback",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({text,session:SID,lang:S.lang})}).catch(()=>{});
    const fb=ta.closest(".fb");if(fb)fb.innerHTML=`<div class="fb-q">${esc(tx().fbthx)}</div>`;
  };
  btn.onclick=submit;
  btn.onkeydown=e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();submit()}};
}

function renderHist(e,c){
  let lines,link=null;
  if(e.type==="help"){lines=helpBeat(c);link={label:"bugcat.org",href:"https://bugcat.org"};}
  else{const rb=resultBeat(e.type,c,e.d||{});lines=intentBeat(e.type,c).concat(rb.lines);link=rb.link;}
  let h='<div style="margin-top:12px">';
  lines.forEach(l=>h+=ln(l.x,l.k));
  if(link)h+=`<div style="margin-top:4px"><a class="out-link" href="${esc(link.href)}" target="_blank" rel="noopener">${esc(link.label)} \u2197</a></div>`;
  return h+"</div>";
}

function renderSel(){
  const t=tx(),opts=[t.rem,t.car,t.hlp];
  let h='<div id="selector" class="selector" role="listbox" tabindex="0" aria-label="actions" aria-activedescendant="opt-0">';
  opts.forEach((o,i)=>{
    h+=`<div class="option${i===0?" sel":""}" id="opt-${i}" role="option" aria-selected="${i===0}" data-o="${i}"><span class="marker" aria-hidden="true">\u203A</span><div><div class="label">${i+1}. ${esc(o.l)}</div>`;
    if(o.d)h+=`<div class="desc">${esc(o.d)}</div>`;
    h+=`</div></div>`;
  });
  return h+"</div>";
}

function bindSel(){
  let s=0;const opts=$$(".option"),lb=$("#selector");if(!opts.length)return;
  const upd=()=>{opts.forEach((e,i)=>{const on=i===s;e.classList.toggle("sel",on);e.setAttribute("aria-selected",on)});if(lb)lb.setAttribute("aria-activedescendant","opt-"+s)};
  opts.forEach((e,i)=>{e.onclick=()=>selOpt(i);e.onmouseenter=()=>{s=i;upd()}});
  if(S._kh)window.removeEventListener("keydown",S._kh);
  const kh=e=>{
    if(S.idx<0||gs(S.idx).m!=="select")return;
    if(e.key==="ArrowDown"||e.key==="j"){e.preventDefault();s=(s+1)%3;upd()}
    if(e.key==="ArrowUp"||e.key==="k"){e.preventDefault();s=(s+2)%3;upd()}
    if(e.key==="Enter"){e.preventDefault();selOpt(s)}
  };
  window.addEventListener("keydown",kh);S._kh=kh;
  if(lb)lb.focus({preventScroll:true});
}

function opGateHtml(){
  return `<div class="continue-btn op-gate" id="opGate" role="button" tabindex="0"><span class="op-caret" aria-hidden="true">›</span><span>${esc(tx().cont)}</span></div>`;
}

function selOpt(i){
  if(S._kh){window.removeEventListener("keydown",S._kh);S._kh=null}
  startOp(S.idx,i===0?"remember":i===1?"caress":"help");
  render();
}

function viewMode(){
  const o=$("#viewOv");
  if(S.vm){o.classList.add("show");const c=CATS[S.idx];if(c){$("#viewPre").textContent=c.src;const vp=$("#viewPre");vp.scrollLeft=0;vp.scrollTop=0}}
  else o.classList.remove("show");
}

/* TAB SWITCH */
function go(ni){
  if(ni===S.idx)return;
  S.sd=ni>S.idx?1:-1;S.idx=ni;S.vm=false;viewMode();
  const a=ni===-1?"anim-fi":(S.sd>0?"anim-sr":"anim-sl"); // home steps back to the whole: fade, not slide
  [$("#srcWrap"),$("#inter")].forEach(el=>{el.classList.remove("anim-sr","anim-sl","anim-fi");void el.offsetWidth;el.classList.add(a)});
  render();
  if(ni===-1) dispatchEvent(new CustomEvent("bugcat:home")); // stir the inkstone (grey, no color)
  track("tab",{cat:ni>=0?ni:null});
}

/* EVENTS */
$("#tab-home").onclick=()=>go(-1);
$$(".tab").forEach(e=>e.onclick=()=>go(+e.dataset.i));
$("#viewClose").onclick=()=>{S.vm=false;viewMode()};
$("#viewOv").onclick=e=>{if(e.target===e.currentTarget){S.vm=false;viewMode()}};
$("#langBtn").onclick=()=>{S.lang=S.lang==="ja"?"en":"ja";langSave(S.lang);render();track("lang")};
["#tab-home","#expandBtn","#viewClose","#langBtn"].forEach(s=>keyActivate($(s)));
$$(".tab").forEach(keyActivate);

window.addEventListener("keydown",e=>{
  if(e.key==="Escape"&&S.vm){S.vm=false;viewMode();return}
  if(S.vm)return;
  if(/^(INPUT|TEXTAREA)$/.test(document.activeElement?.tagName))return; // don't steal arrows while typing
  if(e.key==="ArrowRight"&&S.idx<AFTER){e.preventDefault();go(S.idx+1)}
  if(e.key==="ArrowLeft"&&S.idx>-1){e.preventDefault();go(S.idx>0?S.idx-1:-1)}
});

let ts={x:0,y:0,p:false};
const ia=$("#inter");
ia.addEventListener("touchstart",e=>{ts.x=e.touches[0].clientX;ts.y=e.touches[0].clientY;ts.p=!!e.target.closest("pre,textarea,.fb")},{passive:true});
ia.addEventListener("touchend",e=>{
  if(ts.p)return;
  const dx=e.changedTouches[0].clientX-ts.x,dy=e.changedTouches[0].clientY-ts.y;
  if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.5){
    if(dx<0&&S.idx<AFTER)go(S.idx+1);
    else if(dx>0&&S.idx>-1)go(S.idx>0?S.idx-1:-1);
  }
});

document.body.classList.add("intro");
render();
setTimeout(()=>document.body.classList.remove("intro"),1500);
track("page_view",{ref:document.referrer||undefined});
</script>

<!-- ── 墨流し背景（WebGL流体・自律・発光・ダーク） ── -->
<script src="three.min.js" defer></script>
<script>
const __initInk = () => {
  'use strict';
  if (!window.THREE) return;

  const config = {
    SIM_RES: 200, DYE_RES: 900, PRESSURE_ITER: 26,
    VEL_DISSIPATION: 0.12, DYE_DISSIPATION: 0.035, CURL: 8, SPLAT_RADIUS: 0.0040,
  };
  // Background tuning by audience (keyed to language): JA/IAMAS = invitation (a touch present),
  // EN/ELO = quieter but coupled to reading (scroll stirs it more — see SCROLL_INK).
  const DIM_JA = 0.85, DIM_EN = 0.72;
  function targetDim(){ return (typeof S !== "undefined" && S.lang === "en") ? DIM_EN : DIM_JA; }
  const DIM = DIM_JA;
  const TIME_SCALE = 0.6; // slow the whole simulation (motion + how often things happen)
  const reducedMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;

  // ambient field is monochrome grey sumi only; color appears solely on caress (the cat's wound color)
  const INKS = {
    sumi: new THREE.Color('#b9bdcb'),
  };
  const INK_KEYS = Object.keys(INKS);
  const GROUND = new THREE.Color('#080910');

  let renderer;
  try {
    renderer = new THREE.WebGLRenderer({ antialias:false, alpha:false, depth:false, stencil:false });
  } catch (e) { return; }
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.autoClear = false;
  const cv = renderer.domElement;
  Object.assign(cv.style, { position:'fixed', inset:'0', width:'100vw', height:'100vh', zIndex:'-1', pointerEvents:'none' });
  cv.setAttribute('aria-hidden','true');
  document.body.appendChild(cv);

  const camera = new THREE.OrthographicCamera(-1,1,1,-1,0,1);
  const scene = new THREE.Scene();
  const quad = new THREE.Mesh(new THREE.PlaneGeometry(2,2), null);
  scene.add(quad);

  function makeRT(w,h){ return new THREE.WebGLRenderTarget(w,h,{minFilter:THREE.LinearFilter,magFilter:THREE.LinearFilter,wrapS:THREE.ClampToEdgeWrapping,wrapT:THREE.ClampToEdgeWrapping,format:THREE.RGBAFormat,type:THREE.HalfFloatType,depthBuffer:false}); }
  function makeDoubleFBO(w,h){ return { read:makeRT(w,h), write:makeRT(w,h), texel:new THREE.Vector2(1/w,1/h), swap(){const t=this.read;this.read=this.write;this.write=t;}, resize(nw,nh){this.read.setSize(nw,nh);this.write.setSize(nw,nh);this.texel.set(1/nw,1/nh);} }; }
  function simSizes(){ const a=innerWidth/innerHeight, sim=config.SIM_RES, dye=Math.min(config.DYE_RES,Math.max(innerWidth,innerHeight));
    return a>=1?{sw:Math.round(sim*a),sh:sim,dw:dye,dh:Math.round(dye/a)}:{sw:sim,sh:Math.round(sim/a),dw:Math.round(dye*a),dh:dye}; }

  let SIM = simSizes();
  const velocity=makeDoubleFBO(SIM.sw,SIM.sh), dye=makeDoubleFBO(SIM.dw,SIM.dh), pressure=makeDoubleFBO(SIM.sw,SIM.sh);
  const curlRT=makeRT(SIM.sw,SIM.sh), divergeRT=makeRT(SIM.sw,SIM.sh);

  const VERT=`varying vec2 vUv;void main(){vUv=uv;gl_Position=vec4(position.xy,0.,1.);}`;
  function prog(f,u){ return new THREE.ShaderMaterial({vertexShader:VERT,fragmentShader:f,uniforms:u,depthTest:false,depthWrite:false}); }

  const advectMat=prog(`precision highp float;varying vec2 vUv;uniform sampler2D uVelocity,uSource;uniform vec2 uTexel;uniform float uDt,uDissipation;void main(){vec2 c=vUv-uDt*texture2D(uVelocity,vUv).xy*uTexel;gl_FragColor=texture2D(uSource,c)/(1.0+uDissipation*uDt);}`,{uVelocity:{value:null},uSource:{value:null},uTexel:{value:new THREE.Vector2()},uDt:{value:0},uDissipation:{value:0}});
  const splatMat=prog(`precision highp float;varying vec2 vUv;uniform sampler2D uTarget;uniform float uAspect,uRadius;uniform vec2 uPoint;uniform vec3 uColor;void main(){vec2 p=vUv-uPoint;p.x*=uAspect;vec3 s=exp(-dot(p,p)/uRadius)*uColor;gl_FragColor=vec4(texture2D(uTarget,vUv).rgb+s,1.0);}`,{uTarget:{value:null},uAspect:{value:1},uRadius:{value:0.001},uPoint:{value:new THREE.Vector2()},uColor:{value:new THREE.Vector3()}});
  const curlMat=prog(`precision highp float;varying vec2 vUv;uniform sampler2D uVelocity;uniform vec2 uTexel;void main(){float L=texture2D(uVelocity,vUv-vec2(uTexel.x,0.)).y,R=texture2D(uVelocity,vUv+vec2(uTexel.x,0.)).y,B=texture2D(uVelocity,vUv-vec2(0.,uTexel.y)).x,T=texture2D(uVelocity,vUv+vec2(0.,uTexel.y)).x;gl_FragColor=vec4(0.5*(R-L-T+B),0.,0.,1.);}`,{uVelocity:{value:null},uTexel:{value:new THREE.Vector2()}});
  const vorticityMat=prog(`precision highp float;varying vec2 vUv;uniform sampler2D uVelocity,uCurl;uniform vec2 uTexel;uniform float uCurlStrength,uDt;void main(){float L=texture2D(uCurl,vUv-vec2(uTexel.x,0.)).x,R=texture2D(uCurl,vUv+vec2(uTexel.x,0.)).x,B=texture2D(uCurl,vUv-vec2(0.,uTexel.y)).x,T=texture2D(uCurl,vUv+vec2(0.,uTexel.y)).x,C=texture2D(uCurl,vUv).x;vec2 f=0.5*vec2(abs(T)-abs(B),abs(R)-abs(L));f/=length(f)+0.0001;f*=uCurlStrength*C;f.y*=-1.;vec2 v=texture2D(uVelocity,vUv).xy+f*uDt;gl_FragColor=vec4(clamp(v,-1000.,1000.),0.,1.);}`,{uVelocity:{value:null},uCurl:{value:null},uTexel:{value:new THREE.Vector2()},uCurlStrength:{value:0},uDt:{value:0}});
  const divergeMat=prog(`precision highp float;varying vec2 vUv;uniform sampler2D uVelocity;uniform vec2 uTexel;void main(){float L=texture2D(uVelocity,vUv-vec2(uTexel.x,0.)).x,R=texture2D(uVelocity,vUv+vec2(uTexel.x,0.)).x,B=texture2D(uVelocity,vUv-vec2(0.,uTexel.y)).y,T=texture2D(uVelocity,vUv+vec2(0.,uTexel.y)).y;vec2 C=texture2D(uVelocity,vUv).xy;if(vUv.x-uTexel.x<0.)L=-C.x;if(vUv.x+uTexel.x>1.)R=-C.x;if(vUv.y-uTexel.y<0.)B=-C.y;if(vUv.y+uTexel.y>1.)T=-C.y;gl_FragColor=vec4(0.5*(R-L+T-B),0.,0.,1.);}`,{uVelocity:{value:null},uTexel:{value:new THREE.Vector2()}});
  const pressureMat=prog(`precision highp float;varying vec2 vUv;uniform sampler2D uPressure,uDivergence;uniform vec2 uTexel;void main(){float L=texture2D(uPressure,vUv-vec2(uTexel.x,0.)).x,R=texture2D(uPressure,vUv+vec2(uTexel.x,0.)).x,B=texture2D(uPressure,vUv-vec2(0.,uTexel.y)).x,T=texture2D(uPressure,vUv+vec2(0.,uTexel.y)).x,d=texture2D(uDivergence,vUv).x;gl_FragColor=vec4((L+R+B+T-d)*0.25,0.,0.,1.);}`,{uPressure:{value:null},uDivergence:{value:null},uTexel:{value:new THREE.Vector2()}});
  const gradientMat=prog(`precision highp float;varying vec2 vUv;uniform sampler2D uPressure,uVelocity;uniform vec2 uTexel;void main(){float L=texture2D(uPressure,vUv-vec2(uTexel.x,0.)).x,R=texture2D(uPressure,vUv+vec2(uTexel.x,0.)).x,B=texture2D(uPressure,vUv-vec2(0.,uTexel.y)).x,T=texture2D(uPressure,vUv+vec2(0.,uTexel.y)).x;vec2 v=texture2D(uVelocity,vUv).xy-vec2(R-L,T-B);gl_FragColor=vec4(v,0.,1.);}`,{uPressure:{value:null},uVelocity:{value:null},uTexel:{value:new THREE.Vector2()}});
  const clearMat=prog(`precision highp float;varying vec2 vUv;uniform sampler2D uTexture;uniform float uValue;void main(){gl_FragColor=uValue*texture2D(uTexture,vUv);}`,{uTexture:{value:null},uValue:{value:0.8}});
  const displayMat=prog(`precision highp float;varying vec2 vUv;uniform sampler2D uDye;uniform vec3 uGround;uniform float uDim;
    float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
    float noise(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);}
    void main(){
      float g=noise(vUv*420.)*0.5+noise(vUv*120.)*0.5;
      vec3 ground=uGround+(g-0.5)*0.010;
      vec3 ink=texture2D(uDye,vUv).rgb*uDim;
      vec3 glow=ink/(1.0+ink*0.5);
      vec3 col=ground+glow;
      vec2 uv2=vUv*(1.0-vUv.yx);
      float vign=pow(uv2.x*uv2.y*15.0,0.22);
      col*=0.86+0.14*vign;
      gl_FragColor=vec4(clamp(col,0.,1.),1.0);
    }`,{uDye:{value:null},uGround:{value:new THREE.Vector3(GROUND.r,GROUND.g,GROUND.b)},uDim:{value:DIM}});

  function blit(m,t){ quad.material=m; renderer.setRenderTarget(t); renderer.render(scene,camera); }
  function splatVelocity(x,y,fx,fy,rm){ splatMat.uniforms.uTarget.value=velocity.read.texture; splatMat.uniforms.uAspect.value=innerWidth/innerHeight; splatMat.uniforms.uPoint.value.set(x,y); splatMat.uniforms.uRadius.value=config.SPLAT_RADIUS*(rm||1); splatMat.uniforms.uColor.value.set(fx,fy,0); blit(splatMat,velocity.write); velocity.swap(); }
  function splatDye(x,y,c3,rm){ splatMat.uniforms.uTarget.value=dye.read.texture; splatMat.uniforms.uAspect.value=innerWidth/innerHeight; splatMat.uniforms.uPoint.value.set(x,y); splatMat.uniforms.uRadius.value=config.SPLAT_RADIUS*(rm||1); splatMat.uniforms.uColor.value.copy(c3); blit(splatMat,dye.write); dye.swap(); }

  const _v=new THREE.Vector3();
  // vs = velocity scale of the landing splash; lower = the drop spreads gently, carried by ambient flow
  // the ink seeps in smoothly, a little EVERY frame (~50 frames) — no discrete pulses / flicker
  const inkDrops=[], DROP_FRAMES=50;
  function dropInk(x,y,color,strength,vs){
    const amt=0.30+strength*0.20, a=Math.random()*Math.PI*2, sp=(4+Math.random()*6)*(vs==null?1:vs);
    splatVelocity(x,y,Math.cos(a)*sp,Math.sin(a)*sp,1.8);
    inkDrops.push({x,y,r:color.r,g:color.g,b:color.b,per:amt/DROP_FRAMES,n:DROP_FRAMES});
  }
  function processDrops(){
    for(let i=inkDrops.length-1;i>=0;i--){ const d=inkDrops[i];
      _v.set(d.r,d.g,d.b).multiplyScalar(d.per); splatDye(d.x,d.y,_v,1.0);
      if(--d.n<=0) inkDrops.splice(i,1);
    }
  }

  let cycleIdx=0;
  const nextCycleColor=()=>INKS[INK_KEYS[(cycleIdx++)%INK_KEYS.length]];
  const randomColor=()=>INKS[INK_KEYS[Math.floor(Math.random()*INK_KEYS.length)]];

  // continuous, gentle stirring at two wandering points → a persistent meandering current (a flow, not gusts)
  function ambientStir(now,dt){ const t=now*0.00012, mag=reducedMotion?5:9;
    const cx=0.5+Math.sin(t*1.7)*0.32, cy=0.5+Math.cos(t*1.1)*0.32, a=t*4.0+Math.sin(t*2.3)*1.4;
    splatVelocity(cx,cy,Math.cos(a)*mag,Math.sin(a)*mag,18);
    const cx2=0.5+Math.cos(t*1.3+2.0)*0.30, cy2=0.5+Math.sin(t*0.9+1.0)*0.30, a2=-t*3.4+1.7;
    splatVelocity(cx2,cy2,Math.cos(a2)*mag,Math.sin(a2)*mag,18); }

  let nextDrop=900;
  function autoDrop(now,dt){ nextDrop-=dt*1000; if(nextDrop>0)return; const x=0.12+Math.random()*0.76, y=0.14+Math.random()*0.72; dropInk(x,y,nextCycleColor(),0.55+Math.random()*0.4); if(Math.random()<0.22){ const x2=Math.min(Math.max(x+(Math.random()-0.5)*0.16,0.08),0.92), y2=Math.min(Math.max(y+(Math.random()-0.5)*0.16,0.08),0.92); setTimeout(()=>dropInk(x2,y2,randomColor(),0.4+Math.random()*0.35),220+Math.random()*300);} nextDrop=(reducedMotion?12000:7000)+Math.random()*6000; }

  function autoSweep(){}            // disabled: the large directional sweep read as "strong wind"

  let washing=0;
  function autoWash(){}             // disabled: periodic wash caused ink to vanish abruptly

  function step(dt){
    curlMat.uniforms.uVelocity.value=velocity.read.texture; curlMat.uniforms.uTexel.value.copy(velocity.texel); blit(curlMat,curlRT);
    vorticityMat.uniforms.uVelocity.value=velocity.read.texture; vorticityMat.uniforms.uCurl.value=curlRT.texture; vorticityMat.uniforms.uTexel.value.copy(velocity.texel); vorticityMat.uniforms.uCurlStrength.value=config.CURL; vorticityMat.uniforms.uDt.value=dt; blit(vorticityMat,velocity.write); velocity.swap();
    divergeMat.uniforms.uVelocity.value=velocity.read.texture; divergeMat.uniforms.uTexel.value.copy(velocity.texel); blit(divergeMat,divergeRT);
    clearMat.uniforms.uTexture.value=pressure.read.texture; clearMat.uniforms.uValue.value=0.8; blit(clearMat,pressure.write); pressure.swap();
    pressureMat.uniforms.uDivergence.value=divergeRT.texture; pressureMat.uniforms.uTexel.value.copy(velocity.texel);
    for(let i=0;i<config.PRESSURE_ITER;i++){ pressureMat.uniforms.uPressure.value=pressure.read.texture; blit(pressureMat,pressure.write); pressure.swap(); }
    gradientMat.uniforms.uPressure.value=pressure.read.texture; gradientMat.uniforms.uVelocity.value=velocity.read.texture; gradientMat.uniforms.uTexel.value.copy(velocity.texel); blit(gradientMat,velocity.write); velocity.swap();
    advectMat.uniforms.uVelocity.value=velocity.read.texture; advectMat.uniforms.uSource.value=velocity.read.texture; advectMat.uniforms.uTexel.value.copy(velocity.texel); advectMat.uniforms.uDt.value=dt; advectMat.uniforms.uDissipation.value=config.VEL_DISSIPATION; blit(advectMat,velocity.write); velocity.swap();
    const dyeDis=config.DYE_DISSIPATION+(washing>0?1.7:0);
    advectMat.uniforms.uVelocity.value=velocity.read.texture; advectMat.uniforms.uSource.value=dye.read.texture; advectMat.uniforms.uTexel.value.copy(dye.texel); advectMat.uniforms.uDissipation.value=dyeDis; blit(advectMat,dye.write); dye.swap();
    if(washing>0)washing-=dt;
  }

  let lastT=performance.now(), running=true;
  function frame(now){
    requestAnimationFrame(frame);
    if(!running){ lastT=now; return; }
    let dt=(now-lastT)/1000; lastT=now; dt=Math.min(dt,1/30)*TIME_SCALE; if(dt<=0)return;
    ambientStir(now,dt); autoDrop(now,dt); processDrops(); step(dt);
    const ud=displayMat.uniforms.uDim; ud.value+=(targetDim()-ud.value)*0.05; // ease to per-language dim
    displayMat.uniforms.uDye.value=dye.read.texture; blit(displayMat,null);
  }
  document.addEventListener('visibilitychange',()=>{ running=!document.hidden; });

  function seed(){
    for(let i=0;i<4;i++){
      const x=0.18+Math.random()*0.64, y=0.18+Math.random()*0.64;
      const c=INKS[INK_KEYS[Math.floor(Math.random()*INK_KEYS.length)]];
      setTimeout(()=>dropInk(x,y,c,0.5+Math.random()*0.3,0.35), i*950);
    }
  }
  addEventListener('resize',()=>{ renderer.setSize(innerWidth,innerHeight); SIM=simSizes(); velocity.resize(SIM.sw,SIM.sh); pressure.resize(SIM.sw,SIM.sh); curlRT.setSize(SIM.sw,SIM.sh); divergeRT.setSize(SIM.sw,SIM.sh); dye.resize(SIM.dw,SIM.dh); });

  /* reading motion feeds the ink as a faint grey current; color appears ONLY when a caress meows */
  const SCROLL_INK = true, EVENT_INK = true;
  function injectCurrent(px, py, fx, fy, rm){ splatVelocity(px / innerWidth, 1 - py / innerHeight, fx, fy, rm || 2.0); }
  function injectDye(px, py, color, amt, rm){ _v.set(color.r, color.g, color.b).multiplyScalar(amt); splatDye(px / innerWidth, 1 - py / innerHeight, _v, rm || 1.2); }

  if (SCROLL_INK) {
    const sels = ['#inter', '.src-area', '.view-pre'];
    const lastTop = new WeakMap();
    let lastSt = 0;
    function onScroll(el){
      const now = performance.now();
      const prev = lastTop.has(el) ? lastTop.get(el) : el.scrollTop;
      const d = el.scrollTop - prev;
      lastTop.set(el, el.scrollTop);
      if (Math.abs(d) < 0.5 || now - lastSt < 22) return;
      lastSt = now;
      const r = el.getBoundingClientRect();
      const cx = r.left + r.width  * (0.30 + Math.random() * 0.40);
      const cy = r.top  + r.height * (0.30 + Math.random() * 0.40);
      const k = Math.max(-1, Math.min(1, d / 40));
      const sc = (typeof S !== "undefined" && S.lang === "en") ? 1.7 : 1.0; // ELO: reading stirs the ink more
      injectCurrent(cx, cy, (Math.random() - 0.5) * 70 * sc, -k * 330 * sc, 3.0);
    }
    function bind(){ sels.forEach(s => { const el = document.querySelector(s); if (el && !el._inkBound){ el._inkBound = true; el.addEventListener('scroll', () => onScroll(el), { passive: true }); } }); }
    bind();
    setInterval(bind, 1500);
  }

  if (EVENT_INK) {
    addEventListener('bugcat:caress', e => {
      let col = INKS.sumi;
      try { const i = e.detail && e.detail.cat; if (typeof WARM !== 'undefined' && i >= 0) col = new THREE.Color(WARM[i % WARM.length]); } catch (_) {}
      const t = document.querySelector('.terminal') || document.body;
      const r = t.getBoundingClientRect();
      const cx = r.left + r.width  * (0.30 + Math.random() * 0.40);
      const cy = r.top  + r.height * (0.24 + Math.random() * 0.44);
      injectDye(cx, cy, col, 0.62, 1.6);
      injectCurrent(cx, cy, (Math.random() - 0.5) * 200, (Math.random() - 0.5) * 200, 2.6);
    });
  }

  // returning to BUGCAT (the whole) stirs the inkstone — a soft grey ripple, no color
  addEventListener('bugcat:home', () => {
    const t = document.querySelector('.terminal') || document.body;
    const r = t.getBoundingClientRect();
    const cx = r.left + r.width * 0.5, cy = r.top + r.height * 0.42;
    for (let i = 0; i < 6; i++){ const a = (i / 6) * Math.PI * 2; injectCurrent(cx + Math.cos(a) * 24, cy + Math.sin(a) * 24, Math.cos(a) * 40, Math.sin(a) * 40, 3.2); }
    injectDye(cx, cy, INKS.sumi, 0.16, 3.4);
  });

  seed();
  requestAnimationFrame(frame);
};
if (window.THREE) __initInk(); else addEventListener('DOMContentLoaded', __initInk);
</script>
</body>
</html>
