body{font-family:'JetBrains Mono','Shippori Mincho',monospace;font-weight:400;background:radial-gradient(ellipse at 50% 50%,#26263c 0%,var(--bg) 70%);background-size:100% 200%;animation:breathe 20s ease-in-out infinite;color:var(--src);height:100vh;overflow:hidden;display:flex;flex-direction:column;align-items:center;padding:36px 20px 24px}

.ear{width:0;height:0;border-left:11px solid transparent;border-right:11px solid transparent;border-bottom:12px solid var(--ear);border-radius:2px 2px 0 0}

.tab-logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;padding:0 18px 4px;letter-spacing:.18em;white-space:nowrap;flex-shrink:0;cursor:pointer;transition:color .2s;-webkit-tap-highlight-color:transparent}

.src-wrap{position:relative;flex-shrink:1;min-height:0;max-height:40vh;display:flex;flex-direction:column}

.selector{margin-top:12px}

<script>
const WARM=["#d4a87c","#a8c87c","#d48a8a","#b89cd4","#7cb8d4"];
const CATS=[
{name:"ReentrancyCat",addr:"0xa9e8735dc5f9020f299e1de27d5ac14d43e44dd2",ja:"再入ネコ",en:"Reentrancy Cat",
src:`contract ReentrancyCat is BugCat {
    mapping(address => uint) public balance;

    function deposit() public payable {
        balance[msg.sender] += msg.value;
    }

    function withdraw() public {
        (bool success, ) = msg.sender.call{value: balance[msg.sender]}("");
        require(success);
        balance[msg.sender] = 0;
    }

    function caress() public {
        if (address(this).balance == 0) {
            emit Meow(msg.sender, "reentrancy");
        }
    }

    function remember() external view returns (bool) {
        address TheDAO = 0xBB9bc244D798123fDe783fCc1C72d3Bb8C189413;
        return TheDAO.code.length > 0;
    }
}`,rq:"TheDAO.code.length > 0",cd:'deposit() \u2192 withdraw() \u2192 reenter \u2192 caress()',ma:"reentrancy",
hJa:["2016\u5E746\u670817\u65E5\u3002","The DAO\u304B\u3089360\u4E07ETH\u304C\u6D88\u3048\u305F\u3002","\u3053\u306E\u30CD\u30B3\u306F\u305D\u306E\u50B7\u3092\u7D99\u627F\u3057\u3066\u3044\u308B\u3002"],
hEn:["June 17, 2016.","3.6 million ETH vanished from The DAO.","This cat inherits that wound."]},
{name:"PredictableCat",addr:"0x9050628cae4268e4701d4b011c99db30bc402b1c",ja:"\u4E88\u6E2C\u53EF\u80FD\u30CD\u30B3",en:"Predictable Cat",
src:`contract PredictableCat is BugCat {
    mapping(address => uint8) public winCount;

    function flip() external {
        if ((uint(keccak256(abi.encodePacked(
            block.timestamp,
            block.prevrandao,
            msg.sender
        ))) & 1) == 0) {
            winCount[msg.sender] += 1;
        } else {
            winCount[msg.sender] = 0;
        }

    function caress() public {
        if (winCount[msg.sender] >= 10) {

    function remember() external view returns (bool) {
        address FoMo3Dlong = 0xA62142888ABa8370742bE823c1782D17A0389Da1;

    }
}`,rq:"FoMo3Dlong.code.length > 0",cd:'flip() \u00D7 10 (block predicted) \u2192 caress()',ma:"predictable",
hJa:["2018\u5E74\u3002","FoMo3D\u306E\u6700\u5F8C\u306E\u30E9\u30A6\u30F3\u30C9\u3002","\u52DD\u8005\u306F\u3059\u3067\u306B\u7B54\u3048\u3092\u77E5\u3063\u3066\u3044\u305F\u3002","\u3053\u306E\u30CD\u30B3\u306F\u305D\u306E\u4E88\u6E2C\u53EF\u80FD\u6027\u3092\u7D99\u627F\u3057\u3066\u3044\u308B\u3002"],
hEn:["2018.","The final round of FoMo3D.","The winner already knew the answer.","This cat inherits that predictability."]},
{name:"OverflowCat",addr:"0xf3fe43009429dd8450d916f7118970a52f130cbe",ja:"\u6EA2\u308C\u308B\u30CD\u30B3",en:"Overflow Cat",
src:`contract OverflowCat is BugCat {
    mapping(address => uint) public balance;

    function batchTransfer(
        address[] memory _receivers,
        uint256 _value
    ) public {
        uint count = _receivers.length;
        uint amount = count * _value;
        require(
            _value > 0 &&
            balance[msg.sender] >= amount
        );
        balance[msg.sender] -= amount;
        for (uint i = 0; i < count; i++) {
            balance[_receivers[i]] += _value;
        }
    }

    function caress() public {
        if (balance[msg.sender] > 0) {
            emit Meow(msg.sender, "overflow");
        }
    }

    function remember() external view returns (bool) {
        address BecToken =
            0xC5d105E63711398aF9bbff092d4B6769C82F793D;
        uint256 size;
        assembly { size := extcodesize(BecToken) }
        return size > 0;
    }
}`,rq:"extcodesize(BecToken) > 0",cd:'batchTransfer(overflow) \u2192 caress()',ma:"overflow",
hJa:["2018\u5E744\u670822\u65E5\u3002","BEC Token\u306E\u6B8B\u9AD8\u304C\u7121\u304B\u3089\u751F\u307E\u308C\u305F\u3002","\u3053\u306E\u30CD\u30B3\u306F\u305D\u306E\u6EA2\u308C\u3092\u7D99\u627F\u3057\u3066\u3044\u308B\u3002"],
hEn:["April 22, 2018.","BEC Token balances were created from nothing.","This cat inherits that overflow."]},
{name:"UnprotectedCat",addr:"0x81b4b28c51fde85c062b6ce88fe60cb85bc16fc1",ja:"\u7121\u9632\u5099\u30CD\u30B3",en:"Unprotected Cat",
src:`contract UnprotectedCat is BugCat {

            0x863DF6BFa4469f3ead0bE8f9F2AAE51c91A907b4;

}`,rq:"extcodesize(WalletLibrary) == 0\n  && WalletLibrary.balance > 0",cd:'init(attacker) \u2192 caress()',ma:"unprotected",
hJa:["2017\u5E747\u6708\u3002\u305D\u3057\u306611\u6708\u3002","Parity WalletLibrary\u306F\u521D\u671F\u5316\u3055\u308C\u3001","\u6BBA\u3055\u308C\u305F\u3002","\u30B3\u30FC\u30C9\u306F\u6D88\u3048\u30012\u51048000\u4E07\u30C9\u30EB\u304C\u51CD\u7D50\u3055\u308C\u305F\u3002","\u3053\u306E\u30CD\u30B3\u306F\u305D\u306E\u7121\u9632\u5099\u3092\u7D99\u627F\u3057\u3066\u3044\u308B\u3002"],
hEn:["July 2017. Then November.","Parity WalletLibrary was initialized,","then killed.","The code vanished. $280 million frozen.","This cat inherits that vulnerability."]},
{name:"MisspelledCat",addr:"0xa109dc01fba2557ea87d645f4a9b3b0ceedf625f",ja:"\u7DB4\u308A\u9593\u9055\u3044\u30CD\u30B3",en:"Misspelled Cat",
src:`contract MisspelledCat is BugCat {

        owner = o;

}`,rq:"extcodesize(Rubixi) > 0",cd:'MisspeledCat(attacker) \u2192 caress()',ma:"misspelled",
hJa:["2016\u5E74\u3002","DynamicPyramid\u306FRubixi\u306B\u6539\u540D\u3055\u308C\u305F\u3002","\u30B3\u30F3\u30B9\u30C8\u30E9\u30AF\u30BF\u3060\u3051\u304C\u3001","\u53E4\u3044\u540D\u524D\u306E\u307E\u307E\u6B8B\u3055\u308C\u305F\u3002","\u3053\u306E\u30CD\u30B3\u306F\u305D\u306E\u7DB4\u308A\u9593\u9055\u3044\u3092\u7D99\u627F\u3057\u3066\u3044\u308B\u3002"],
hEn:["2016.","DynamicPyramid was renamed to Rubixi.","Only the constructor kept the old name.","This cat inherits that misspelling."]}
];

const IFACE=`interface BugCat {
    function remember() external view returns (bool);
    function caress() external;
    event Meow(address indexed who, string vulnerability);
}`;

const T={
ja:{ov:["これは、スマートコントラクトによって生まれた、脆弱性という傷を抱くネコたちの文学作品です。","Ethereumの歴史を揺るがした脆弱性が、それぞれ異なるネコのスマートコントラクトに引き継がれ、ブロックチェーン上にデプロイされています。","誰もがネコを撫でることができます。そして、ネコが持つ脆弱性の条件を満たすとき、ネコはミャオと鳴きます。","それぞれのネコは、Ethereumに残る歴史的コントラクトと実際に繋がっています。ネコはこれらの痕跡を思い出し、コードの存在を証明します。","すべてのネコは、以下のインターフェースを実装しています:"],
ovEnd:"上のタブからネコを選んでください。ネコを形作るコードの詩を読み、ネコの記憶を思い出させ、ネコを撫でることができます。",
rem:{l:"remember()",d:"ネコの記憶を呼び覚ます。"},car:{l:"caress()",d:"ネコを撫でる。"},hlp:{l:"help",d:"このネコについて。"},
qry:"照会中",txs:"tx 送信中",txc:"tx confirmed.",cont:"続ける",lng:"EN"},
en:{ov:["This is a literary work of cats born from smart contracts, each bearing the wound of a vulnerability.","Vulnerabilities that shook the history of Ethereum have been inherited by different cat smart contracts and deployed on the blockchain.","Anyone can caress a cat. And when the conditions of the cat's vulnerability are met, the cat meows.","Each cat is connected to historical contracts that remain on Ethereum. The cats recall these traces and prove the existence of the code.","All cats implement the following interface:"],
ovEnd:"Select a cat from the tabs above. Read the poem of code that shapes the cat, recall the cat's memory, and caress the cat.",
rem:{l:"remember()",d:"Recall the cat's memory."},car:{l:"caress()",d:"Caress the cat."},hlp:{l:"help",d:"About this cat."},
qry:"querying",txs:"tx sending",txc:"tx confirmed.",cont:"Continue",lng:"JA"}
};

/* STATE */
const S={idx:-1,lang:new URLSearchParams(location.search).get("lang")||"ja",vm:false,sd:0,cs:{},pops:{},_di:null,_kh:null};
function gs(i){if(!S.cs[i])S.cs[i]={h:[],m:"select"};return S.cs[i]}

/* ANONYMOUS LOG — ephemeral in-memory session id (not stored on device), cookieless beacon */
const SID=Math.random().toString(36).slice(2,10);
function track(type,extra){try{const d=JSON.stringify({type,session:SID,lang:S.lang,path:location.pathname,...extra});navigator.sendBeacon("/api/event",new Blob([d],{type:"application/json"}))}catch(e){}}

/* ASYNC OPS */
const MIN_DUR={remember:3000,caress:6000};
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const txShort=h=>h.slice(0,10)+"\u2026"+h.slice(-6);

function buildRes(type,c,d){
  if(type==="remember"){
    const lines=["$ remember()","","  "+c.rq,"","  \u2192 "+(d.exists?"true":"false")];
    if(d.block) lines.push("","  block "+d.block);
    return {lines};
  }
  const lines=["$ caress()","","  "+c.cd,""];
  if(d.txHash) lines.push("  "+T[S.lang].txc);
  if(d.meow) lines.push('  event Meow(msg.sender, "'+c.ma+'")');
  if(d.block) lines.push("  block "+d.block);
  const link=d.txHash?{label:"tx "+txShort(d.txHash),href:"https://etherscan.io/tx/"+d.txHash}:null;
  return {lines,link};
}
function simulateRes(type,c){
  if(type==="remember") return {lines:["$ remember()","","  "+c.rq,"","  \u2192 true"]};
  return {lines:["$ caress()","","  "+c.cd,"","  "+T[S.lang].txc,'  event Meow(msg.sender, "'+c.ma+'")'],link:null};
}

function startOp(ci,type){
  const c=CATS[ci];if(!S.pops[ci])S.pops[ci]={};
  const op={type,ci,st:Date.now(),done:false,res:null};
  op.p=(async()=>{
    const start=Date.now();let res;
    try{
      const r=await fetch("/api/"+type,{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({cat:ci,session:SID,lang:S.lang})});
      const d=await r.json();
      if(!r.ok||!d||d.ok===false) throw new Error("api");
      res=buildRes(type,c,d);
    }catch(e){
      res=simulateRes(type,c);
    }
    const elapsed=Date.now()-start;
    if(elapsed<MIN_DUR[type]) await sleep(MIN_DUR[type]-elapsed);
    op.res=res;op.done=true;
    if(type==="caress"&&res.lines.some(l=>l.includes("event Meow"))) inkBloom(WARM[ci]);
    const cs=gs(ci);
    if(cs.m==="pending-"+type){startTyping(ci,type,res.lines,res.link);if(S.idx===ci)render();}
    delete S.pops[ci]?.[type];
    return res;
  })();
  S.pops[ci][type]=op;return op;
}

/* DOM */
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);
const tx=()=>T[S.lang];
const esc=s=>s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
function ln(t,w){return`<div class="out-line${w?" warm":""}">${esc(t)}</div>`}
const REDUCED=matchMedia("(prefers-reduced-motion:reduce)").matches;
function announce(t){const el=$("#sr-live");if(el){el.textContent="";requestAnimationFrame(()=>{el.textContent=t})}}
function keyActivate(el){if(el)el.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();el.click()}})}

/* RENDER */
function render(){
  const i=S.idx,c=i>=0?CATS[i]:null,w=i>=0?WARM[i]:"#d4a87c";
  document.querySelector(".terminal").style.setProperty("--warm",w);
  $("#tab-home").style.color=i===-1?"var(--src)":"var(--dim)";
  $("#tab-home").setAttribute("aria-selected",i===-1);
  $$(".tab").forEach(el=>{const ti=+el.dataset.i;el.classList.toggle("active",ti===i);el.style.borderBottomColor=ti===i?WARM[ti]:"transparent";el.setAttribute("aria-selected",ti===i)});
  document.documentElement.lang=S.lang;
  const sw=$("#srcWrap"),sp=$("#sep");
  if(i>=0){sw.style.display="";sp.style.display="";$("#srcPre").textContent=c.src;
    $("#expandBtn").onclick=()=>{S.vm=true;viewMode()};
  }else{sw.style.display="none";sp.style.display="none"}
  if(c)$("#viewPre").textContent=c.src;
  renderInter();
  $("#langBtn").textContent=tx().lng;
}

function renderInter(){
  const i=S.idx,c=i>=0?CATS[i]:null,el=$("#inter");
  if(i===-1){renderOv(el);return}
  const cs=gs(i);let h="";
  const tl=S.lang==="ja"?c.ja:c.en;
  h+=`<div class="cat-title"><span class="cat-title-name">${c.name}</span><span class="cat-title-ja"> / ${tl}</span></div>`;
  cs.h.forEach(e=>h+=renderHist(e,c));
  if(cs.m.startsWith("pending-")){
    const type=cs.m.replace("pending-",""),op=S.pops[i]?.[type];
    if(op){const dt=Math.floor((Date.now()-op.st)/400),dots=".".repeat(dt%30);
      h+='<div style="margin-top:12px">';
      if(type==="remember"){h+=ln("$ remember()")+ln("")+ln("  "+c.rq)+ln("  "+tx().qry+dots)}
      else{h+=ln("$ caress()")+ln("")+ln("  "+c.cd)+ln("  "+tx().txs+dots)}
      h+="</div>";}
  }
  if(cs.m==="typing"&&cs.typing){
    h+='<div style="margin-top:12px">';
    cs.typing.lines.slice(0,cs.typing.shown).forEach(l=>{
      const w=l.includes("\u2192 true")||l.includes("event Meow");
      h+=ln(l,w);
    });
    h+='</div>';
  }
  if(cs.m==="continue")h+=`<div class="continue-btn" id="contBtn" role="button" tabindex="0"><span aria-hidden="true">›</span><span>${esc(tx().cont)}</span></div>`;
  if(cs.m==="select")h+=renderSel();
  el.innerHTML=h;
  if(cs.m==="select")bindSel();
  if(cs.m==="continue")bindCont();
  if(cs.m.startsWith("pending-")){
    clearInterval(S._di);
    S._di=setInterval(()=>{if(gs(S.idx)?.m?.startsWith("pending-"))renderInter();else{clearInterval(S._di);S._di=null}},400);
  }
  if(i>=0)el.scrollTo({top:el.scrollHeight,behavior:"smooth"});
}

function renderOv(el){
  const t=tx();let h='<div class="overview">';
  t.ov.forEach(p=>h+=`<p>${esc(p)}</p>`);
  h+=`<pre>${esc(IFACE)}</pre><p>${esc(t.ovEnd)}</p></div>`;
  el.innerHTML=h;
}

function renderHist(e,c){
  let h='<div style="margin-top:12px">';
  if(e.type==="remember"||e.type==="caress"){
    e.lines.forEach(l=>{const w=l.includes("\u2192 true")||l.includes("event Meow");h+=ln(l,w)});
    if(e.link)h+=`<div style="margin-top:4px"><a class="out-link" href="${esc(e.link.href)}" target="_blank" rel="noopener">${esc(e.link.label)} \u2197</a></div>`;
  }else if(e.type==="help"){
    const ls=S.lang==="ja"?c.hJa:c.hEn;
    h+=ln("$ help")+ln("");ls.forEach(l=>h+=ln("  "+l));
    h+=`<div style="margin-top:4px"><a class="out-link" href="https://bugcat.org" target="_blank" rel="noopener">bugcat.org \u2197</a></div>`;
  }
  return h+"</div>";
}

function renderSel(){
  const t=tx(),opts=[t.rem,t.car,t.hlp];
  let h='<div class="selector" role="listbox" tabindex="0" aria-label="actions" aria-activedescendant="opt-0">';
  opts.forEach((o,i)=>{
    h+=`<div class="option${i===0?" sel":""}" id="opt-${i}" role="option" aria-selected="${i===0}" data-o="${i}"><span class="marker" aria-hidden="true">\u203A</span><div><div class="label">${i+1}. ${esc(o.l)}</div>`;
    if(o.d)h+=`<div class="desc">${esc(o.d)}</div>`;
    h+=`</div></div>`;
  });
  return h+"</div>";
}

function bindSel(){
  let s=0;const opts=$$(".option"),lb=$("#selector");if(!opts.length)return;
  const upd=()=>{opts.forEach((e,i)=>{const on=i===s;e.classList.toggle("sel",on);e.setAttribute("aria-selected",on)});if(lb)lb.setAttribute("aria-activedescendant","opt-"+s)};
  opts.forEach((e,i)=>{e.onclick=()=>selOpt(i);e.onmouseenter=()=>{s=i;upd()}});
  if(S._kh)window.removeEventListener("keydown",S._kh);
  const kh=e=>{
    if(S.idx<0||gs(S.idx).m!=="select")return;
    if(e.key==="ArrowDown"||e.key==="j"){e.preventDefault();s=(s+1)%3;upd()}
    if(e.key==="ArrowUp"||e.key==="k"){e.preventDefault();s=(s+2)%3;upd()}
    if(e.key==="Enter"){e.preventDefault();selOpt(s)}
  };
  window.addEventListener("keydown",kh);S._kh=kh;
  if(lb)lb.focus({preventScroll:true});
}

function bindCont(){
  const cb=$("#contBtn");if(cb){cb.onclick=doContinue;cb.focus({preventScroll:true})}
  if(S._kh)window.removeEventListener("keydown",S._kh);
  const kh=e=>{
    if(S.idx<0||gs(S.idx).m!=="continue")return;
    if(e.key==="Enter"||e.key===" "){e.preventDefault();doContinue()}
  };
  window.addEventListener("keydown",kh);S._kh=kh;
}

function doContinue(){
  if(S._kh){window.removeEventListener("keydown",S._kh);S._kh=null}
  gs(S.idx).m="select";
  renderInter();
}

function selOpt(i){
  if(S._kh){window.removeEventListener("keydown",S._kh);S._kh=null}
  const cs=gs(S.idx),c=CATS[S.idx];
  if(i===0){cs.m="pending-remember";startOp(S.idx,"remember")}
  else if(i===1){cs.m="pending-caress";startOp(S.idx,"caress")}
  else{
    const ls=S.lang==="ja"?c.hJa:c.hEn;
    const lines=["$ help","",...ls.map(l=>"  "+l)];
    startTyping(S.idx,"help",lines);
    track("help",{cat:S.idx});
  }
  render();
}

function startTyping(ci,type,lines,link){
  const cs=gs(ci);
  announce(lines.join(". "));
  if(REDUCED){
    cs.h.push({type,lines,link:link||null});
    cs.m="continue";
    if(S.idx===ci)renderInter();
    return;
  }
  cs.m="typing";
  cs.typing={type,lines,link:link||null,shown:0};
  clearInterval(S._ti);
  S._ti=setInterval(()=>{
    const s=gs(ci);
    if(!s.typing||s.m!=="typing"){clearInterval(S._ti);S._ti=null;return}
    s.typing.shown++;
    if(s.typing.shown>=s.typing.lines.length){
      clearInterval(S._ti);S._ti=null;
      s.h.push({type:s.typing.type,lines:s.typing.lines,link:s.typing.link});
      s.typing=null;s.m="continue";
    }
    if(S.idx===ci)renderInter();
  },150);
}

function viewMode(){
  const o=$("#viewOv");
  if(S.vm){o.classList.add("show");const c=CATS[S.idx];if(c)$("#viewPre").textContent=c.src}
  else o.classList.remove("show");
}

/* TAB SWITCH */
function go(ni){
  if(ni===S.idx)return;
  S.sd=ni>S.idx?1:-1;S.idx=ni;S.vm=false;viewMode();
  const a=S.sd===0?"anim-fi":S.sd>0?"anim-sr":"anim-sl";
  [$("#srcWrap"),$("#inter")].forEach(el=>{el.classList.remove("anim-sr","anim-sl","anim-fi");void el.offsetWidth;el.classList.add(a)});
  render();
  track("tab",{cat:ni>=0?ni:null});
}

/* EVENTS */
$("#tab-home").onclick=()=>go(-1);
$$(".tab").forEach(e=>e.onclick=()=>go(+e.dataset.i));
$("#viewClose").onclick=()=>{S.vm=false;viewMode()};
$("#viewOv").onclick=e=>{if(e.target===e.currentTarget){S.vm=false;viewMode()}};
$("#langBtn").onclick=()=>{S.lang=S.lang==="ja"?"en":"ja";render();track("lang")};
["#tab-home","#expandBtn","#viewClose","#langBtn"].forEach(s=>keyActivate($(s)));
$$(".tab").forEach(keyActivate);

window.addEventListener("keydown",e=>{
  if(e.key==="Escape"&&S.vm){S.vm=false;viewMode();return}
  if(S.vm)return;
  if(e.key==="ArrowRight"&&S.idx<CATS.length-1){e.preventDefault();go(S.idx+1)}
  if(e.key==="ArrowLeft"&&S.idx>-1){e.preventDefault();go(S.idx>0?S.idx-1:-1)}
});

let ts={x:0,y:0,p:false};
const ia=$("#inter");
ia.addEventListener("touchstart",e=>{ts.x=e.touches[0].clientX;ts.y=e.touches[0].clientY;ts.p=!!e.target.closest("pre")},{passive:true});
ia.addEventListener("touchend",e=>{
  if(ts.p)return;
  const dx=e.changedTouches[0].clientX-ts.x,dy=e.changedTouches[0].clientY-ts.y;
  if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.5){
    if(dx<0&&S.idx<CATS.length-1)go(S.idx+1);
    else if(dx>0&&S.idx>-1)go(S.idx>0?S.idx-1:-1);
  }
});

/* BACKGROUND — slowly morphing, sideways-drifting gradient wash (no shapes) */
const inkCv=document.createElement("canvas");inkCv.id="ink";inkCv.setAttribute("aria-hidden","true");
document.body.insertBefore(inkCv,document.body.firstChild);
const ink=inkCv.getContext("2d");
let inkW=0,inkH=0,inkTint=null,inkLum=0;
// shared field: baseline tonal depth from everyone's caresses so far (fetched once on load)
fetch("/api/state",{method:"POST"}).then(r=>r.json()).then(d=>{if(d&&typeof d.caress==="number")inkLum=Math.max(inkLum,.35*(1-Math.exp(-d.caress/300)))}).catch(()=>{});
// near-grayscale, faintly cool palette — value variation only, no color meaning
const PAL=[[28,30,36],[40,42,50],[24,26,31],[44,47,55],[33,35,42]];
function inkResize(){const dpr=Math.min(devicePixelRatio||1,2);inkW=innerWidth;inkH=innerHeight;inkCv.width=inkW*dpr;inkCv.height=inkH*dpr;ink.setTransform(dpr,0,0,dpr,0,0);if(REDUCED)inkDraw(0)}
addEventListener("resize",inkResize);
function hexRgb(h){h=h.replace("#","");return parseInt(h.slice(0,2),16)+","+parseInt(h.slice(2,4),16)+","+parseInt(h.slice(4,6),16)}
const lerp=(a,b,t)=>a+(b-a)*t;
function palRGB(u){u=(u%1+1)%1;const n=PAL.length,f=u*n,i=Math.floor(f),t=f-i,a=PAL[i%n],b=PAL[(i+1)%n];return[lerp(a[0],b[0],t),lerp(a[1],b[1],t),lerp(a[2],b[2],t)]}
function inkCol(u){const c=palRGB(u),L=inkLum*48;return`rgb(${c[0]+L|0},${c[1]+L|0},${c[2]+L|0})`}
function inkLayer(x0,y0,x1,y1,phase,alpha){const g=ink.createLinearGradient(x0,y0,x1,y1);for(let i=0;i<6;i++)g.addColorStop(i/5,inkCol(i/5+phase));ink.globalAlpha=alpha;ink.fillStyle=g;ink.fillRect(0,0,inkW,inkH)}
function inkBloom(){
  inkTint={c:"150,154,164",age:0,life:REDUCED?1:200}; // neutral pulse — no hue
  inkLum=Math.min(inkLum+.04,.35);                    // immediate local feedback (shared total on next load)
  if(REDUCED)inkDraw(0)}
function inkDraw(now){const t=now*4e-5;
  ink.globalCompositeOperation="source-over";
  inkLayer(0,0,inkW,inkH*.25,t,1);            // base layer, drifts one way
  inkLayer(0,inkH,inkW,inkH*.75,-t*.7+.5,.5); // counter layer, blends into a morphing field
  if(inkTint){const lp=inkTint.age/inkTint.life,a=Math.sin(Math.min(lp,1)*Math.PI)*.12;ink.globalAlpha=Math.max(0,a);ink.fillStyle=`rgb(${inkTint.c})`;ink.fillRect(0,0,inkW,inkH);if(!REDUCED)inkTint.age++;if(inkTint.age>=inkTint.life)inkTint=null}
  ink.globalAlpha=1;
}
function inkFrame(now){inkDraw(now);requestAnimationFrame(inkFrame)}
inkResize();
if(REDUCED)inkDraw(0);else requestAnimationFrame(inkFrame);

render();
track("page_view",{ref:document.referrer||undefined});
</script>
</body>
</html>
